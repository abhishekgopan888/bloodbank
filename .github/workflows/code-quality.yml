name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2, phpstan, pint
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check PHP syntax
        run: |
          find app routes config database -name "*.php" -type f -exec php -l {} \;

      - name: Run Pint (PHP Code Style)
        run: ./vendor/bin/pint --test app routes config database tests
        continue-on-error: true

      - name: Run PHPStan (Static Analysis)
        run: ./vendor/bin/phpstan analyse app routes config --level=5
        continue-on-error: true

      - name: Check for Security Issues
        run: composer audit
        continue-on-error: true

      - name: Validate Composer
        run: composer validate

      - name: Check Laravel Configuration
        run: |
          php artisan config:clear
          php artisan config:cache
          php artisan config:clear

      - name: Lint Routes
        run: php artisan route:list --json > /dev/null

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  api-spec:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenAPI Specification
        run: |
          npm install -g @apidevtools/swagger-cli
          swagger-cli validate docs/openapi.yaml

      - name: Check API Documentation
        run: |
          if [ ! -f "docs/openapi.yaml" ]; then
            echo "OpenAPI specification not found!"
            exit 1
          fi
          echo "✓ OpenAPI specification found and valid"
