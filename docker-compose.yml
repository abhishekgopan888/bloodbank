version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloodbank-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bloodbank
      - DB_USERNAME=bloodbank
      - DB_PASSWORD=bloodbank_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    networks:
      - bloodbank
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: bloodbank-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - bloodbank
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: mysql:8.0
    container_name: bloodbank-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: bloodbank
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: bloodbank_secret
      MYSQL_USER: bloodbank
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - bloodbank
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: bloodbank-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - bloodbank
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloodbank-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    working_dir: /app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bloodbank
      - DB_USERNAME=bloodbank
      - DB_PASSWORD=bloodbank_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    networks:
      - bloodbank
    depends_on:
      - app
      - db
      - redis

networks:
  bloodbank:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
